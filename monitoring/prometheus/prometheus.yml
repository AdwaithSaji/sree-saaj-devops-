global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sreesaaj-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: /metrics

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8001']
    metrics_path: /metrics

  - job_name: 'event-service'
    static_configs:
      - targets: ['event-service:8002']
    metrics_path: /metrics

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8003']
    metrics_path: /metrics

  - job_name: 'billing-service'
    static_configs:
      - targets: ['billing-service:8004']
    metrics_path: /metrics

  - job_name: 'gallery-service'
    static_configs:
      - targets: ['gallery-service:8005']
    metrics_path: /metrics

  - job_name: 'menu-service'
    static_configs:
      - targets: ['menu-service:8006']
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
