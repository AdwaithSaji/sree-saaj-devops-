apiVersion: v1
kind: ConfigMap
metadata:
  name: sreesaaj-config
  namespace: sreesaaj
data:
  ALGORITHM: "HS256"
  ALLOWED_ORIGINS: "https://sreesaaj.com,https://www.sreesaaj.com"
  AUTH_SERVICE_URL: "http://auth-service:8001"
  EVENT_SERVICE_URL: "http://event-service:8002"
  INVENTORY_SERVICE_URL: "http://inventory-service:8003"
  BILLING_SERVICE_URL: "http://billing-service:8004"
  GALLERY_SERVICE_URL: "http://gallery-service:8005"
  MENU_SERVICE_URL: "http://menu-service:8006"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
