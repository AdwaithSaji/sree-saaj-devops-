---
# api-gateway — entry point for all /api traffic from the Ingress
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sreesaaj
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
---
# auth-service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sreesaaj
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - name: http
    port: 8001
    targetPort: 8001
    protocol: TCP
