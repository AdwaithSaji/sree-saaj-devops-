apiVersion: apps/v1
kind: Deployment
metadata:
  name: menu-service
  namespace: sreesaaj
  labels:
    app: menu-service
    app.kubernetes.io/name: menu-service
    app.kubernetes.io/component: backend
    version: v1
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: menu-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: menu-service
        app.kubernetes.io/name: menu-service
        version: v1
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: menu-service
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: menu-service
        image: sreesaajproductionacr.azurecr.io/sreesaaj/menu-service:latest
        ports:
        - name: http
          containerPort: 8006
          protocol: TCP
        envFrom:
        - configMapRef:
            name: sreesaaj-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sreesaaj-secrets
              key: database-url-menu
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: sreesaaj-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        livenessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 3
