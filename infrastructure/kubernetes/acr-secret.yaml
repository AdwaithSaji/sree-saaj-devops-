# acr-secret — grants AKS permission to pull images from Azure Container Registry
#
# This file cannot be applied with kubectl apply — it documents the ONE-TIME
# command you must run before deploying any service. The secret stores your
# ACR credentials inside the cluster.
#
# ── Step 1: Get your ACR password ────────────────────────────────────────────
#
#   az acr credential show --name sreesaajproductionacr --query "passwords[0].value" -o tsv
#
# ── Step 2: Create the secret in the sreesaaj namespace ──────────────────────
#
#   kubectl create secret docker-registry acr-secret \
#     --namespace sreesaaj \
#     --docker-server=sreesaajproductionacr.azurecr.io \
#     --docker-username=sreesaajproductionacr \
#     --docker-password=<paste-password-from-step-1>
#
# ── Step 3: Verify ────────────────────────────────────────────────────────────
#
#   kubectl get secret acr-secret -n sreesaaj
#
# ── After this, re-apply deployments ─────────────────────────────────────────
#
#   kubectl apply -f infrastructure/kubernetes/deployments/
#
# ── Alternative: use AcrPull managed identity (Terraform already sets this) ──
#
# If you have run `terraform apply` and the AcrPull role assignment is in place,
# the acr-secret is not required. Managed identity handles auth automatically.
# The imagePullSecrets entry in each deployment is harmless even if the secret
# does not exist when managed identity is active — Kubernetes falls through to
# the node's identity credentials.
#
# To verify managed identity is working:
#
#   az aks check-acr \
#     --name sreesaaj-production-aks \
#     --resource-group sreesaaj-production-rg \
#     --acr sreesaajproductionacr.azurecr.io
