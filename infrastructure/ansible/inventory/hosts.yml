---
# ─────────────────────────────────────────────────────────────────────────────
# Ansible Inventory — Sree Saaj Events & Caterers
#
# AKS is a managed service: there are no SSH-accessible master/worker nodes.
# All kubectl operations run locally (or on a CI runner) against the AKS
# API server using credentials fetched via `az aks get-credentials`.
# ─────────────────────────────────────────────────────────────────────────────

all:
  children:

    # ── AKS deployer host (local machine / CI runner) ─────────────────────────
    aks_deployer:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

  vars:
    # ── Azure identifiers ──────────────────────────────────────────────────────
    azure_resource_group:  "sreesaaj-production-rg"
    azure_aks_cluster:     "sreesaaj-production-aks"
    acr_login_server:      "sreesaajproductionacr.azurecr.io"

    # ── Kubernetes context & namespace ─────────────────────────────────────────
    k8s_namespace:     "sreesaaj"
    k8s_context:       "sreesaaj-production-aks"

    # ── Paths (relative to repository root) ───────────────────────────────────
    manifest_base_dir: "{{ playbook_dir }}/../../kubernetes"

    # ── Services deployed to AKS ───────────────────────────────────────────────
    k8s_deployments:
      - name: api-gateway
        image: "{{ acr_login_server }}/sreesaaj/api-gateway"
        port: 8000
      - name: auth-service
        image: "{{ acr_login_server }}/sreesaaj/auth-service"
        port: 8001
      - name: event-service
        image: "{{ acr_login_server }}/sreesaaj/event-service"
        port: 8002
      - name: inventory-service
        image: "{{ acr_login_server }}/sreesaaj/inventory-service"
        port: 8003
      - name: billing-service
        image: "{{ acr_login_server }}/sreesaaj/billing-service"
        port: 8004
      - name: gallery-service
        image: "{{ acr_login_server }}/sreesaaj/gallery-service"
        port: 8005
      - name: menu-service
        image: "{{ acr_login_server }}/sreesaaj/menu-service"
        port: 8006
      - name: frontend
        image: "{{ acr_login_server }}/sreesaaj/frontend"
        port: 80
