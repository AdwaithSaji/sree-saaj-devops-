<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory — Sree Saaj Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link href="../static/css/neon.css" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { background:var(--bg-primary); }
    .sidebar { width:240px; background:rgba(255,255,255,0.03); border-right:1px solid rgba(255,0,64,0.15); position:fixed; inset-y:0; left:0; z-index:40; display:flex; flex-direction:column; }
    .main-area { flex:1; margin-left:240px; display:flex; flex-direction:column; }
    .topbar { background:rgba(10,10,15,0.9); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,0,64,0.1); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:30; }
    .nav-link { display:flex; align-items:center; gap:0.75rem; padding:0.7rem 1rem; border-radius:10px; color:var(--text-muted); font-size:0.875rem; font-weight:500; text-decoration:none; transition:all 0.2s; }
    .nav-link:hover { background:rgba(255,0,64,0.08); color:#fff; }
    .nav-link.active { background:rgba(255,0,64,0.15); color:var(--neon-red); border-left:2px solid var(--neon-red); }
    input, select { background:rgba(255,255,255,0.05); border:1px solid rgba(255,0,64,0.2); color:#fff; border-radius:10px; padding:0.6rem 1rem; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
    input:focus, select:focus { border-color:var(--neon-red); }
    input::placeholder { color:var(--text-muted); }
    select option { background:#1a1a2e; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal-box { background:#0f0f1a; border:1px solid rgba(255,0,64,0.25); border-radius:20px; padding:2rem; max-width:520px; width:100%; }
    .stock-bar-bg { background:rgba(255,255,255,0.08); border-radius:4px; height:6px; overflow:hidden; }
    .stock-bar { height:100%; border-radius:4px; transition:width 0.4s; }
  </style>
</head>
<body x-data="inventoryAdmin()" style="display:flex;min-height:100vh;">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div style="padding:1.5rem 1rem;border-bottom:1px solid rgba(255,0,64,0.1);">
      <a href="../index.html" style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;">
        <img src="../static/images/saaj-logo.png" alt="Sree Saaj" style="height:36px;width:auto;filter:drop-shadow(0 0 6px rgba(255,0,64,0.5));" />
        <div>
          <div style="font-family:'Playfair Display',serif;color:var(--neon-red);font-size:0.95rem;font-weight:700;">Sree Saaj</div>
          <div style="color:var(--text-muted);font-size:0.7rem;">Admin Panel</div>
        </div>
      </a>
    </div>
    <nav style="flex:1;padding:1rem;overflow-y:auto;">
      <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
      <a href="events.html" class="nav-link">📅 Events</a>
      <a href="#" class="nav-link">📋 Bookings</a>
      <a href="inventory.html" class="nav-link active">📦 Inventory</a>
      <a href="billing.html" class="nav-link">💰 Billing</a>
      <a href="staff.html" class="nav-link">👥 Staff</a>
      <div style="height:1px;background:rgba(255,0,64,0.1);margin:0.75rem 0;"></div>
      <a href="../gallery.html" class="nav-link">🖼️ Gallery</a>
      <a href="../menu.html" class="nav-link">🍽️ Menu</a>
      <div style="height:1px;background:rgba(255,0,64,0.1);margin:0.75rem 0;"></div>
      <a href="../index.html" class="nav-link">🌐 View Website</a>
    </nav>
    <div style="padding:1rem;border-top:1px solid rgba(255,0,64,0.1);">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,0,64,0.15);border:1px solid rgba(255,0,64,0.3);display:flex;align-items:center;justify-content:center;color:var(--neon-red);font-weight:700;font-size:0.85rem;" x-text="user?.full_name?.charAt(0)||'A'"></div>
        <div style="flex:1;"><div style="color:#fff;font-size:0.85rem;font-weight:500;" x-text="user?.full_name||'Admin'"></div><div style="color:var(--neon-red);font-size:0.7rem;">admin</div></div>
        <button @click="logout()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;" title="Logout">⏏</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div>
        <h1 style="font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;">Inventory</h1>
        <p style="color:var(--text-muted);font-size:0.75rem;" x-text="'Track equipment & supplies · ' + lowStockCount + ' low stock alerts'"></p>
      </div>
      <button @click="openModal()" class="btn-neon-solid" style="padding:0.6rem 1.2rem;font-size:0.85rem;">+ Add Item</button>
    </header>

    <main style="flex:1;padding:1.5rem;">
      <!-- Summary Cards -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem;">
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:var(--neon-red);" x-text="items.length"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">Total Items</div>
        </div>
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:#4ade80;" x-text="items.filter(i=>i.available>i.minStock).length"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">In Stock</div>
        </div>
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:#f59e0b;" x-text="lowStockCount"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">Low Stock</div>
        </div>
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:#60a5fa;" x-text="items.reduce((s,i)=>s+i.taken,0)"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">Currently Out</div>
        </div>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
        <input x-model="search" placeholder="Search items..." style="max-width:280px;"/>
        <select x-model="categoryFilter">
          <option value="">All Categories</option>
          <option>Decoration</option><option>Furniture</option><option>Lighting</option>
          <option>Catering</option><option>Audio/Visual</option><option>Linen</option>
        </select>
        <label style="display:flex;align-items:center;gap:0.5rem;color:var(--text-muted);font-size:0.85rem;cursor:pointer;">
          <input type="checkbox" x-model="showLowOnly" style="width:auto;"/> Low stock only
        </label>
      </div>

      <!-- Inventory Table -->
      <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,0,64,0.1);border-radius:16px;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,0,64,0.1);">
              <th style="text-align:left;padding:0.85rem 1.25rem;color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;">Item</th>
              <th style="text-align:left;padding:0.85rem 1.25rem;color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;">Category</th>
              <th style="text-align:left;padding:0.85rem 1.25rem;color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;">Stock</th>
              <th style="text-align:left;padding:0.85rem 1.25rem;color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;">Available / Taken</th>
              <th style="text-align:left;padding:0.85rem 1.25rem;color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="item in filteredItems" :key="item.id">
              <tr style="border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.2s;" onmouseover="this.style.background='rgba(255,0,64,0.04)'" onmouseout="this.style.background='transparent'">
                <td style="padding:1rem 1.25rem;">
                  <div style="color:#fff;font-size:0.9rem;font-weight:500;" x-text="item.name"></div>
                  <div style="color:var(--text-muted);font-size:0.75rem;" x-text="item.unit"></div>
                </td>
                <td style="padding:1rem 1.25rem;">
                  <span style="display:inline-block;background:rgba(255,0,64,0.1);border:1px solid rgba(255,0,64,0.2);color:var(--neon-red);font-size:0.72rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:20px;" x-text="item.category"></span>
                </td>
                <td style="padding:1rem 1.25rem;min-width:120px;">
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                    <span style="color:#fff;font-size:0.85rem;" x-text="item.total"></span>
                    <span style="color:var(--text-muted);font-size:0.75rem;" x-text="'min:' + item.minStock"></span>
                  </div>
                  <div class="stock-bar-bg">
                    <div class="stock-bar"
                      :style="'width:' + Math.min(100,(item.available/item.total)*100) + '%;background:' + (item.available <= item.minStock ? '#f59e0b' : '#4ade80')"></div>
                  </div>
                </td>
                <td style="padding:1rem 1.25rem;">
                  <span style="color:#4ade80;font-size:0.9rem;" x-text="item.available + ' avail'"></span>
                  <span style="color:var(--text-muted);font-size:0.85rem;"> / </span>
                  <span style="color:#60a5fa;font-size:0.9rem;" x-text="item.taken + ' out'"></span>
                  <span x-show="item.available <= item.minStock" style="display:inline-block;background:rgba(245,158,11,0.15);color:#f59e0b;font-size:0.7rem;font-weight:700;padding:0.1rem 0.5rem;border-radius:10px;margin-left:0.4rem;">LOW</span>
                </td>
                <td style="padding:1rem 1.25rem;">
                  <div style="display:flex;gap:0.5rem;">
                    <button @click="editItem(item)" style="padding:0.25rem 0.65rem;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;border:none;background:rgba(59,130,246,0.15);color:#60a5fa;">Edit</button>
                    <button @click="deleteItem(item.id)" style="padding:0.25rem 0.65rem;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;border:none;background:rgba(255,0,64,0.1);color:var(--neon-red);">Del</button>
                  </div>
                </td>
              </tr>
            </template>
            <tr x-show="filteredItems.length===0">
              <td colspan="5" style="padding:3rem;text-align:center;color:var(--text-muted);">No items found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" x-show="showModal" x-cloak @click.self="showModal=false" style="display:none;">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
        <h3 style="font-family:'Playfair Display',serif;color:#fff;font-size:1.2rem;" x-text="editMode?'Edit Item':'Add Item'"></h3>
        <button @click="showModal=false" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem;">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Item Name</label><input x-model="form.name" placeholder="Round Tables"/></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Category</label>
            <select x-model="form.category">
              <option>Decoration</option><option>Furniture</option><option>Lighting</option>
              <option>Catering</option><option>Audio/Visual</option><option>Linen</option>
            </select>
          </div>
          <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Unit</label><input x-model="form.unit" placeholder="pieces / sets / meters"/></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
          <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Total</label><input x-model.number="form.total" type="number" placeholder="100"/></div>
          <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Available</label><input x-model.number="form.available" type="number" placeholder="85"/></div>
          <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Min Stock</label><input x-model.number="form.minStock" type="number" placeholder="10"/></div>
        </div>
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem;justify-content:flex-end;">
        <button @click="showModal=false" class="btn-neon" style="padding:0.65rem 1.5rem;">Cancel</button>
        <button @click="saveItem()" class="btn-neon-solid" style="padding:0.65rem 1.5rem;" x-text="editMode?'Update':'Add'"></button>
      </div>
    </div>
  </div>

<script>
  function inventoryAdmin() {
    return {
      user: JSON.parse(localStorage.getItem('user')||'null'),
      search:'', categoryFilter:'', showLowOnly:false,
      showModal:false, editMode:false, nextId:20,
      form:{name:'',category:'Decoration',unit:'pieces',total:0,available:0,taken:0,minStock:5},
      items:[
        {id:1,name:'Round Tables (5ft)',category:'Furniture',unit:'pieces',total:50,available:42,taken:8,minStock:5},
        {id:2,name:'Plastic Chairs',category:'Furniture',unit:'pieces',total:500,available:380,taken:120,minStock:50},
        {id:3,name:'Fairy Lights',category:'Decoration',unit:'meters',total:2000,available:1650,taken:350,minStock:200},
        {id:4,name:'LED Panels',category:'Lighting',unit:'units',total:20,available:14,taken:6,minStock:4},
        {id:5,name:'Stainless Steel Vessels (Large)',category:'Catering',unit:'pieces',total:80,available:72,taken:8,minStock:10},
        {id:6,name:'Table Cloth (White)',category:'Linen',unit:'pieces',total:120,available:98,taken:22,minStock:20},
        {id:7,name:'Microphone + Stand',category:'Audio/Visual',unit:'sets',total:10,available:7,taken:3,minStock:2},
        {id:8,name:'Flower Vases',category:'Decoration',unit:'pieces',total:200,available:18,taken:182,minStock:30},
        {id:9,name:'Backdrop Frames',category:'Decoration',unit:'units',total:15,available:9,taken:6,minStock:3},
        {id:10,name:'Serving Plates (SS)',category:'Catering',unit:'pieces',total:400,available:310,taken:90,minStock:50},
      ],
      get lowStockCount() { return this.items.filter(i=>i.available<=i.minStock).length; },
      get filteredItems() {
        return this.items.filter(i=>{
          const q=this.search.toLowerCase();
          const ms=!q||i.name.toLowerCase().includes(q);
          const mc=!this.categoryFilter||i.category===this.categoryFilter;
          const ml=!this.showLowOnly||(i.available<=i.minStock);
          return ms&&mc&&ml;
        });
      },
      openModal(){this.editMode=false;this.form={name:'',category:'Decoration',unit:'pieces',total:0,available:0,taken:0,minStock:5};this.showModal=true;},
      editItem(i){this.editMode=true;this.form={...i};this.showModal=true;},
      saveItem(){
        if(this.editMode){const idx=this.items.findIndex(e=>e.id===this.form.id);if(idx!==-1)this.items[idx]={...this.form,taken:this.form.total-this.form.available};}
        else{this.items.unshift({...this.form,id:this.nextId++,taken:this.form.total-this.form.available});}
        this.showModal=false;
      },
      deleteItem(id){if(confirm('Delete?'))this.items=this.items.filter(e=>e.id!==id);},
      logout(){localStorage.clear();window.location.href='../login.html';},
      init(){if(!localStorage.getItem('access_token'))window.location.href='../login.html';}
    };
  }
</script>
</body>
</html>
