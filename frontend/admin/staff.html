<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff — Sree Saaj Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link href="../static/css/neon.css" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { background:var(--bg-primary); }
    .sidebar { width:240px; background:rgba(255,255,255,0.03); border-right:1px solid rgba(255,0,64,0.15); position:fixed; inset-y:0; left:0; z-index:40; display:flex; flex-direction:column; }
    .main-area { flex:1; margin-left:240px; display:flex; flex-direction:column; }
    .topbar { background:rgba(10,10,15,0.9); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,0,64,0.1); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:30; }
    .nav-link { display:flex; align-items:center; gap:0.75rem; padding:0.7rem 1rem; border-radius:10px; color:var(--text-muted); font-size:0.875rem; font-weight:500; text-decoration:none; transition:all 0.2s; }
    .nav-link:hover { background:rgba(255,0,64,0.08); color:#fff; }
    .nav-link.active { background:rgba(255,0,64,0.15); color:var(--neon-red); border-left:2px solid var(--neon-red); }
    input, select { background:rgba(255,255,255,0.05); border:1px solid rgba(255,0,64,0.2); color:#fff; border-radius:10px; padding:0.6rem 1rem; font-size:0.9rem; outline:none; transition:border-color 0.2s; width:100%; }
    input:focus, select:focus { border-color:var(--neon-red); }
    input::placeholder { color:var(--text-muted); }
    select option { background:#1a1a2e; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal-box { background:#0f0f1a; border:1px solid rgba(255,0,64,0.25); border-radius:20px; padding:2rem; max-width:520px; width:100%; max-height:90vh; overflow-y:auto; }
    .staff-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,0,64,0.1); border-radius:14px; padding:1.25rem; transition:all 0.25s; }
    .staff-card:hover { border-color:rgba(255,0,64,0.35); box-shadow:0 0 20px rgba(255,0,64,0.1); }
    .role-badge { display:inline-block; padding:0.2rem 0.6rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
    .role-admin { background:rgba(255,0,64,0.15); color:var(--neon-red); }
    .role-staff { background:rgba(96,165,250,0.15); color:#60a5fa; }
    .status-active { background:rgba(34,197,94,0.15); color:#4ade80; }
    .status-inactive { background:rgba(107,114,128,0.15); color:#9ca3af; }
  </style>
</head>
<body x-data="staffAdmin()" style="display:flex;min-height:100vh;">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div style="padding:1.5rem 1rem;border-bottom:1px solid rgba(255,0,64,0.1);">
      <a href="../index.html" style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;">
        <img src="../static/images/saaj-logo.png" alt="Sree Saaj" style="height:36px;width:auto;filter:drop-shadow(0 0 6px rgba(255,0,64,0.5));" />
        <div>
          <div style="font-family:'Playfair Display',serif;color:var(--neon-red);font-size:0.95rem;font-weight:700;">Sree Saaj</div>
          <div style="color:var(--text-muted);font-size:0.7rem;">Admin Panel</div>
        </div>
      </a>
    </div>
    <nav style="flex:1;padding:1rem;overflow-y:auto;">
      <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
      <a href="events.html" class="nav-link">📅 Events</a>
      <a href="#" class="nav-link">📋 Bookings</a>
      <a href="inventory.html" class="nav-link">📦 Inventory</a>
      <a href="billing.html" class="nav-link">💰 Billing</a>
      <a href="staff.html" class="nav-link active">👥 Staff</a>
      <div style="height:1px;background:rgba(255,0,64,0.1);margin:0.75rem 0;"></div>
      <a href="../gallery.html" class="nav-link">🖼️ Gallery</a>
      <a href="../menu.html" class="nav-link">🍽️ Menu</a>
      <div style="height:1px;background:rgba(255,0,64,0.1);margin:0.75rem 0;"></div>
      <a href="../index.html" class="nav-link">🌐 View Website</a>
    </nav>
    <div style="padding:1rem;border-top:1px solid rgba(255,0,64,0.1);">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,0,64,0.15);border:1px solid rgba(255,0,64,0.3);display:flex;align-items:center;justify-content:center;color:var(--neon-red);font-weight:700;font-size:0.85rem;" x-text="user?.full_name?.charAt(0)||'A'"></div>
        <div style="flex:1;"><div style="color:#fff;font-size:0.85rem;" x-text="user?.full_name||'Admin'"></div><div style="color:var(--neon-red);font-size:0.7rem;">admin</div></div>
        <button @click="logout()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;">⏏</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div>
        <h1 style="font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;">Staff Management</h1>
        <p style="color:var(--text-muted);font-size:0.75rem;" x-text="activeCount + ' active · ' + staffMembers.length + ' total'"></p>
      </div>
      <button @click="openModal()" class="btn-neon-solid" style="padding:0.6rem 1.2rem;font-size:0.85rem;">+ Add Staff</button>
    </header>

    <main style="flex:1;padding:1.5rem;">
      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem;">
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:var(--neon-red);" x-text="staffMembers.length"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">Total Staff</div>
        </div>
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:#4ade80;" x-text="activeCount"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">Active</div>
        </div>
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:#60a5fa;" x-text="staffMembers.filter(s=>s.role==='staff').length"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">Staff</div>
        </div>
        <div class="glass" style="padding:1.25rem;text-align:center;">
          <div style="font-size:1.8rem;font-weight:700;color:#f59e0b;" x-text="staffMembers.filter(s=>s.role==='admin').length"></div>
          <div style="color:var(--text-muted);font-size:0.8rem;">Admins</div>
        </div>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
        <input x-model="search" placeholder="Search staff..." style="max-width:280px;"/>
        <select x-model="roleFilter" style="max-width:160px;">
          <option value="">All Roles</option>
          <option value="admin">Admin</option>
          <option value="staff">Staff</option>
        </select>
        <select x-model="deptFilter" style="max-width:200px;">
          <option value="">All Departments</option>
          <option>Decoration</option><option>Catering</option><option>Coordination</option>
          <option>Management</option><option>Driver</option><option>Support</option>
        </select>
      </div>

      <!-- Staff Grid -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;">
        <template x-for="member in filteredStaff" :key="member.id">
          <div class="staff-card">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
              <div style="width:48px;height:48px;border-radius:50%;background:rgba(255,0,64,0.15);border:1px solid rgba(255,0,64,0.3);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--neon-red);flex-shrink:0;" x-text="member.name.charAt(0)"></div>
              <div style="flex:1;min-width:0;">
                <div style="color:#fff;font-size:0.95rem;font-weight:600;" x-text="member.name"></div>
                <div style="color:var(--text-muted);font-size:0.78rem;" x-text="member.department"></div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;">
                <span class="role-badge" :class="member.role==='admin'?'role-admin':'role-staff'" x-text="member.role"></span>
                <span style="display:inline-block;padding:0.15rem 0.5rem;border-radius:20px;font-size:0.7rem;font-weight:600;" :class="member.active?'status-active':'status-inactive'" x-text="member.active?'Active':'Inactive'"></span>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem;">
              <div style="color:var(--text-muted);font-size:0.78rem;">📞 <span x-text="member.phone"></span></div>
              <div style="color:var(--text-muted);font-size:0.78rem;">📧 <span x-text="member.email"></span></div>
            </div>
            <div style="display:flex;gap:0.5rem;">
              <button @click="editMember(member)" style="flex:1;padding:0.4rem;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,0,64,0.2);background:rgba(255,0,64,0.05);color:var(--neon-red);">Edit</button>
              <button @click="toggleActive(member)" style="flex:1;padding:0.4rem;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text-muted);" x-text="member.active?'Deactivate':'Activate'"></button>
              <button @click="deleteMember(member.id)" style="padding:0.4rem 0.65rem;border-radius:8px;font-size:0.8rem;cursor:pointer;border:none;background:rgba(255,0,64,0.1);color:var(--neon-red);">🗑</button>
            </div>
          </div>
        </template>
        <div x-show="filteredStaff.length===0" style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">No staff found.</div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" x-show="showModal" x-cloak @click.self="showModal=false" style="display:none;">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
        <h3 style="font-family:'Playfair Display',serif;color:#fff;font-size:1.2rem;" x-text="editMode?'Edit Staff Member':'Add Staff Member'"></h3>
        <button @click="showModal=false" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem;">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Full Name</label><input x-model="form.name" placeholder="Rajan Pillai"/></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Email</label><input x-model="form.email" type="email" placeholder="rajan@sreesaaj.com"/></div>
          <div><label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Phone</label><input x-model="form.phone" placeholder="+91 8075707566"/></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Role</label>
            <select x-model="form.role"><option value="staff">Staff</option><option value="admin">Admin</option></select>
          </div>
          <div>
            <label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Department</label>
            <select x-model="form.department">
              <option>Decoration</option><option>Catering</option><option>Coordination</option>
              <option>Management</option><option>Driver</option><option>Support</option>
            </select>
          </div>
        </div>
        <div x-show="!editMode">
          <label style="color:var(--text-muted);font-size:0.8rem;display:block;margin-bottom:0.3rem;">Password</label>
          <input x-model="form.password" type="password" placeholder="Minimum 8 characters"/>
        </div>
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem;justify-content:flex-end;">
        <button @click="showModal=false" class="btn-neon" style="padding:0.65rem 1.5rem;">Cancel</button>
        <button @click="saveMember()" class="btn-neon-solid" style="padding:0.65rem 1.5rem;" x-text="editMode?'Update':'Add Staff'"></button>
      </div>
    </div>
  </div>

<script>
  function staffAdmin() {
    return {
      user: JSON.parse(localStorage.getItem('user')||'null'),
      search:'', roleFilter:'', deptFilter:'',
      showModal:false, editMode:false, nextId:20,
      form:{name:'',email:'',phone:'',role:'staff',department:'Decoration',password:''},
      staffMembers:[
        {id:1,name:'Saajan K. Nair',email:'admin@sreesaaj.com',phone:'+91 8075707566',role:'admin',department:'Management',active:true},
        {id:2,name:'Lakshmi R.',email:'lakshmi@sreesaaj.com',phone:'+91 9123456789',role:'staff',department:'Catering',active:true},
        {id:3,name:'Arun Prakash',email:'arun@sreesaaj.com',phone:'+91 9234567890',role:'staff',department:'Decoration',active:true},
        {id:4,name:'Divya Menon',email:'divya@sreesaaj.com',phone:'+91 9345678901',role:'staff',department:'Coordination',active:true},
        {id:5,name:'Rajan Pillai',email:'rajan@sreesaaj.com',phone:'+91 9456789012',role:'staff',department:'Decoration',active:true},
        {id:6,name:'Sinu Thomas',email:'sinu@sreesaaj.com',phone:'+91 9567890123',role:'staff',department:'Catering',active:true},
        {id:7,name:'Biju Varghese',email:'biju@sreesaaj.com',phone:'+91 9678901234',role:'staff',department:'Driver',active:false},
        {id:8,name:'Meera Krishnan',email:'meera@sreesaaj.com',phone:'+91 9789012345',role:'staff',department:'Support',active:true},
      ],
      get activeCount(){return this.staffMembers.filter(s=>s.active).length;},
      get filteredStaff(){
        return this.staffMembers.filter(m=>{
          const q=this.search.toLowerCase();
          const ms=!q||m.name.toLowerCase().includes(q)||m.email.toLowerCase().includes(q);
          const mr=!this.roleFilter||m.role===this.roleFilter;
          const md=!this.deptFilter||m.department===this.deptFilter;
          return ms&&mr&&md;
        });
      },
      openModal(){this.editMode=false;this.form={name:'',email:'',phone:'',role:'staff',department:'Decoration',password:''};this.showModal=true;},
      editMember(m){this.editMode=true;this.form={...m};this.showModal=true;},
      saveMember(){
        if(this.editMode){const idx=this.staffMembers.findIndex(m=>m.id===this.form.id);if(idx!==-1)this.staffMembers[idx]={...this.staffMembers[idx],...this.form};}
        else{this.staffMembers.push({...this.form,id:this.nextId++,active:true});}
        this.showModal=false;
      },
      toggleActive(m){m.active=!m.active;},
      deleteMember(id){if(confirm('Remove this staff member?'))this.staffMembers=this.staffMembers.filter(m=>m.id!==id);},
      logout(){localStorage.clear();window.location.href='../login.html';},
      init(){if(!localStorage.getItem('access_token'))window.location.href='../login.html';}
    };
  }
</script>
</body>
</html>
