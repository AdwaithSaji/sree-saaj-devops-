name: CI — Build & Push to ACR

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. sreesaajproductionacr.azurecr.io
  IMAGE_PREFIX:     sreesaaj
  PYTHON_VERSION:   "3.11"

jobs:
  # ── JOB 1: Code Quality ────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('services/**/requirements.txt') }}

      - name: Install linters
        run: pip install flake8 black isort

      - name: flake8
        run: |
          flake8 services/ \
            --max-line-length=120 \
            --exclude=__pycache__,migrations \
            --per-file-ignores="__init__.py:F401"
        continue-on-error: true

      - name: black
        run: black --check services/ --line-length=120
        continue-on-error: true

      - name: isort
        run: isort --check-only services/ --line-length=120
        continue-on-error: true


  # ── JOB 2: Unit / Integration Tests ───────────────────────────────────────
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - event-service
          - inventory-service
          - billing-service
          - # gallery-service
          - menu-service

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB:       test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout  5s
          --health-retries  5
        ports:
          - 5432:5432

    env:
      DATABASE_URL:           postgresql+asyncpg://testuser:testpassword@localhost:5432/test_db
      SECRET_KEY:             ci-only-test-secret-not-used-in-production
      ALGORITHM:              HS256
      ALLOWED_ORIGINS:        "http://localhost"
      AUTH_SERVICE_URL:       "http://localhost:8001"
      EVENT_SERVICE_URL:      "http://localhost:8002"
      INVENTORY_SERVICE_URL:  "http://localhost:8003"
      BILLING_SERVICE_URL:    "http://localhost:8004"
      GALLERY_SERVICE_URL:    "http://localhost:8005"
      MENU_SERVICE_URL:       "http://localhost:8006"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip — ${{ matrix.service }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements.txt', matrix.service)) }}

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Import smoke test
        run: |
          cd services/${{ matrix.service }}
          python -c "import main; print('Import OK: ${{ matrix.service }}')"

      - name: Run tests (if tests/ directory exists)
        run: |
          cd services/${{ matrix.service }}
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
          else
            echo "No tests/ directory — skipping pytest"
          fi


  # ── JOB 3: Build & Push all service images to ACR ─────────────────────────
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test]

    # Only push images on pushes to main or develop — not on PRs
    if: github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: services/api-gateway
          - name: auth-service
            context: services/auth-service
          - name: event-service
            context: services/event-service
          - name: inventory-service
            context: services/inventory-service
          - name: billing-service
            context: services/billing-service
          - name: gallery-service
            context: services/gallery-service
          - name: menu-service
            context: services/menu-service
          - name: frontend
            context: .
            dockerfile: frontend/Dockerfile

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to Azure ───────────────────────────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Set up Docker Buildx for layer caching ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Compute image tags ─────────────────────────────────────────────────
      # Produces tags:
      #   <acr>/sreesaaj/<service>:sha-<short-sha>       always
      #   <acr>/sreesaaj/<service>:latest                 on main only
      #   <acr>/sreesaaj/<service>:develop                on develop only
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}

      # ── Build and push ─────────────────────────────────────────────────────
      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.service.context }}
          file:       ${{ matrix.service.dockerfile || format('{0}/Dockerfile', matrix.service.context) }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max

      # ── Scan for vulnerabilities ───────────────────────────────────────────
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:sha-${{ github.sha }}
          format:    table
          exit-code: "0"        # Warn only — don't fail the build for now
          severity:  "CRITICAL,HIGH"
        continue-on-error: true

      - name: Azure logout
        if: always()
        run: az logout
