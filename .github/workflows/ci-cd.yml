name: CI/CD — Build & Test (No Secrets Required)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel a run in progress when a newer commit is pushed to the same branch
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint (runs once, fast gate before the expensive matrix jobs)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('services/**/requirements.txt') }}

      - name: Install linters
        run: pip install flake8 black

      - name: flake8
        run: |
          flake8 services/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --per-file-ignores="__init__.py:F401"
        continue-on-error: true

      - name: black
        run: black --check services/ --line-length=120
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Test (matrix: all 6 backend services run in parallel)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false          # let all matrix legs finish even if one fails
      matrix:
        service:
          - auth-service
          - event-service
          - inventory-service
          - billing-service
          - gallery-service
          - menu-service

    env:
      # Safe placeholder values — no real credentials needed
      DATABASE_URL:  "sqlite+aiosqlite:///./test.db"
      SECRET_KEY:    "ci-test-secret-key-not-used-in-production"
      ALGORITHM:     "HS256"
      ALLOWED_ORIGINS: "http://localhost"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip — ${{ matrix.service }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements.txt', matrix.service)) }}
          restore-keys: pip-${{ matrix.service }}-

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Smoke test — import check
        run: |
          cd services/${{ matrix.service }}
          python -c "import main; print('OK: ${{ matrix.service }}')"

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests/ directory yet — placeholder passed"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Docker build (matrix: all services + frontend build in parallel)
  #
  # Images are built but NOT pushed (no registry secrets needed).
  # Layer cache is stored in GitHub Actions cache between runs so
  # subsequent builds are fast even without a registry.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [lint, test]

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: services/api-gateway
          - name: auth-service
            context: services/auth-service
          - name: event-service
            context: services/event-service
          - name: inventory-service
            context: services/inventory-service
          - name: billing-service
            context: services/billing-service
          - name: gallery-service
            context: services/gallery-service
          - name: menu-service
            context: services/menu-service
          - name: frontend
            context: .
            dockerfile: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.service.context }}
          file:       ${{ matrix.service.dockerfile || format('{0}/Dockerfile', matrix.service.context) }}
          push:       false          # local build only — no registry needed
          tags:       sreesaaj/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Docker Compose validation
  # Confirms the full compose file is parseable and all service definitions
  # are structurally valid — no containers are actually started.
  # ────────────────────────────────────────────────────────────────────────────
  compose-check:
    name: Compose Validate
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
